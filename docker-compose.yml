# ============================================================================
#  BookPoint - Ecosistema de microservicios sobre Docker
#  Levanta: MySQL 8 + RabbitMQ + 10 microservicios + API Gateway
#  Uso:  docker compose up --build
#  Las credenciales/URLs locales se sobrescriben por variables de entorno,
#  sin modificar los application.properties de cada servicio.
# ============================================================================

services:

  # ----------------------------- Infraestructura ----------------------------
  mysql:
    image: mysql:8.4
    container_name: bookpoint-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"   # 3307 en el host para no chocar con un MySQL local en 3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bookpoint-net]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bookpoint-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bookpoint-net]

  # ----------------------------- Microservicios -----------------------------
  ms-sucursales:
    build: { context: ., dockerfile: ms-sucursales/Dockerfile }
    container_name: ms-sucursales
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_sucursales?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports: ["8090:8090"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-inventario:
    build: { context: ., dockerfile: ms-inventario/Dockerfile }
    container_name: ms-inventario
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_inventario?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_APPLICATION_JSON: '{"app.feign.ms-sucursales.url":"http://ms-sucursales:8090"}'
    ports: ["8082:8082"]
    depends_on:
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-usuarios:
    build: { context: ., dockerfile: ms-usuarios/Dockerfile }
    container_name: ms-usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_usuarios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports: ["8083:8083"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-catalogo:
    build: { context: ., dockerfile: ms-catalogo/Dockerfile }
    container_name: ms-catalogo
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_catalogo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports: ["8084:8084"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-promociones:
    build: { context: ., dockerfile: ms-promociones/Dockerfile }
    container_name: ms-promociones
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_promociones?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports: ["8087:8087"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-facturacion:
    build: { context: ., dockerfile: ms-facturacion/Dockerfile }
    container_name: ms-facturacion
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_facturacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports: ["8088:8088"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-bodega:
    build: { context: ., dockerfile: ms-bodega/Dockerfile }
    container_name: ms-bodega
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_bodega?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_APPLICATION_JSON: '{"app.feign.ms-inventario.url":"http://ms-inventario:8082"}'
    ports: ["8089:8089"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-logistica:
    build: { context: ., dockerfile: ms-logistica/Dockerfile }
    container_name: ms-logistica
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_logistica?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_APPLICATION_JSON: '{"app.feign.ms-sucursales.url":"http://ms-sucursales:8090"}'
    ports: ["8085:8085"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-proveedores:
    build: { context: ., dockerfile: ms-proveedores/Dockerfile }
    container_name: ms-proveedores
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_proveedores?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports: ["8086:8086"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [bookpoint-net]

  ms-ventas:
    build: { context: ., dockerfile: ms-ventas/Dockerfile }
    container_name: ms-ventas
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookpoint_ventas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_APPLICATION_JSON: >-
        {"app.feign.ms-inventario.url":"http://ms-inventario:8082",
         "app.feign.ms-promociones.url":"http://ms-promociones:8087",
         "app.feign.ms-facturacion.url":"http://ms-facturacion:8088",
         "app.feign.ms-usuarios.url":"http://ms-usuarios:8083"}
    ports: ["8081:8081"]
    depends_on:
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [bookpoint-net]

  # ------------------------------- API Gateway ------------------------------
  ms-gateway:
    build: { context: ., dockerfile: ms-gateway/Dockerfile }
    container_name: ms-gateway
    environment:
      # Se reescriben las URIs de cada ruta para apuntar a los contenedores
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_URI: http://ms-ventas:8081
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_URI: http://ms-inventario:8082
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_2_URI: http://ms-usuarios:8083
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_3_URI: http://ms-catalogo:8084
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_4_URI: http://ms-logistica:8085
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_5_URI: http://ms-proveedores:8086
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_6_URI: http://ms-promociones:8087
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_7_URI: http://ms-facturacion:8088
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_8_URI: http://ms-bodega:8089
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_9_URI: http://ms-sucursales:8090
    ports: ["8080:8080"]
    depends_on:
      - ms-ventas
      - ms-inventario
      - ms-usuarios
      - ms-catalogo
      - ms-logistica
      - ms-proveedores
      - ms-promociones
      - ms-facturacion
      - ms-bodega
      - ms-sucursales
    networks: [bookpoint-net]

volumes:
  mysql-data:

networks:
  bookpoint-net:
    driver: bridge
