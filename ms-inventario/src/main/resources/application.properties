# application.properties - ms-inventario
# Configuración del Microservicio de Inventario para BookPoint Chile
# Base de datos local segmentada y configuraciones de Hibernate

# Puerto del Servidor local
server.port=8082

# Nombre del Microservicio en Spring Boot
spring.application.name=ms-inventario

# Conexión a la base de datos MySQL en XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/bookpoint_inventario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Generación automática de tablas por Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Registro y Descubrimiento Eureka (Desactivado temporalmente para pruebas locales)
eureka.client.enabled=false

# Habilitar logging del nivel INFO para trazabilidad de ajustes y salidas en ms-inventario
logging.level.cl.bookpointchile.inventario=INFO

# Configuración del Cliente Feign del ms-sucursales
app.feign.ms-sucursales.url=http://localhost:8090
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

# Configuración RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
