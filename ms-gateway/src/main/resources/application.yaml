spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: ms-ventas
            uri: http://localhost:8081
            predicates:
              - Path=/api/ventas/**

          - id: ms-inventario
            uri: http://localhost:8082
            predicates:
              - Path=/api/inventario/**

          - id: ms-usuarios
            uri: http://localhost:8083
            predicates:
              - Path=/api/usuarios/**

          - id: ms-catalogo
            uri: http://localhost:8084
            predicates:
              - Path=/api/catalogo/**

          - id: ms-logistica
            uri: http://localhost:8085
            predicates:
              - Path=/api/logistica/**

          - id: ms-proveedores
            uri: http://localhost:8086
            predicates:
              - Path=/api/proveedores/**

          - id: ms-promociones
            uri: http://localhost:8087
            predicates:
              - Path=/api/promociones/**

          - id: ms-facturacion
            uri: http://localhost:8088
            predicates:
              - Path=/api/facturacion/**

          - id: ms-bodega
            uri: http://localhost:8089
            predicates:
              - Path=/api/bodega/**

          - id: ms-sucursales
            uri: http://localhost:8090
            predicates:
              - Path=/api/sucursales/**

server:
  port: 8080
